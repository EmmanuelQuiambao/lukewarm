---
apiVersion: hive.stackable.tech/v1alpha1
kind: HiveCluster
metadata:
  name: lukewarm-hive
spec:
  image:
    productVersion: "3.1.3"
  clusterConfig:
    database:
      connString: jdbc:postgresql://lukewarm-postgresql:5432/metastore
      user: hive
      password: hive
      dbType: postgres
    s3:
      inline:
        host: lukewarm-minio
        port: 9000
        accessStyle: Path
        credentials:
          secretClass: lukewarm-minio-credentials
  metastore:
    roleGroups:
      default:
        replicas: 1
        config:
          resources:
            cpu:
              min: "250m"
              max: "500m"
            memory:
              limit: "512Mi"
---
apiVersion: secrets.stackable.tech/v1alpha1
kind: SecretClass
metadata:
  name: lukewarm-minio-credentials
spec:
  backend:
    k8sSearch:
      searchNamespace:
        pod: {}
---
apiVersion: v1
kind: Secret
metadata:
  name: lukewarm-minio-credentials
  labels:
    secrets.stackable.tech/class: lukewarm-minio-credentials
stringData:
  accessKey: minioadmin
  secretKey: minioadmin
